<title>Grassland World — Arc 1+2</title>
<style>
  html, body { margin: 0; height: 100%; overflow: hidden; background: #9ed2e8; }
  canvas { display: block; }
  #hud {
    position: fixed; left: 14px; bottom: 14px; z-index: 2;
    font: 13px/1.5 ui-sans-serif, system-ui, sans-serif; color: #2e4632;
    background: rgba(236, 233, 216, 0.82); border: 1px solid rgba(107, 79, 53, 0.35);
    border-radius: 8px; padding: 8px 12px; max-width: 340px;
  }
  #hud label { cursor: pointer; user-select: none; color: #6b4f35; }
  #hud b { color: #6b4f35; }
  a { color: #4aa8b8; } a:hover { color: #6b4f35; }
  #prompt {
    position: fixed; left: 50%; bottom: 40px; transform: translate(-50%, 12px);
    z-index: 3; display: flex; align-items: center; gap: 10px;
    background: rgba(250,248,240,.82); backdrop-filter: blur(6px);
    border: 1px solid rgba(107,79,53,.25); border-radius: 12px;
    padding: 9px 16px 9px 11px; color: #4a3826;
    font: 500 15px/1 ui-sans-serif, system-ui, sans-serif; letter-spacing: .2px;
    box-shadow: 0 6px 22px rgba(46,70,50,.18);
    opacity: 0; pointer-events: none; transition: opacity .18s ease, transform .18s ease;
  }
  #prompt.on { opacity: 1; transform: translate(-50%, 0); }
  #prompt .key {
    display: inline-grid; place-items: center; min-width: 26px; height: 26px; padding: 0 6px;
    border-radius: 7px; background: #6b4f35; color: #fdf6e8; font-weight: 700; font-size: 14px;
    box-shadow: 0 2px 0 rgba(0,0,0,.18);
  }
  #prompt .act { opacity: .92; }
</style>

<script type="module">

import { FBXLoader } from 'three/addons/loaders/FBXLoader.js';
import * as A from './assets.js';

// ================= world + lighting =================
// One biome (grassland). Day/Night changes ONLY lighting & colors — the
// world content (flora mix, objects) is identical in both.
const TREE_MIX = [0.30, 0.28, 0.27, 0.08, 0.07]; // pine oak birch willow dead
const LIGHTING = {
  day: {
    name: 'Grassland', sky: 0x9ed2e8, fogNear: 70, fogFar: 250,
    hemiSky: 0xbfe3f2, hemiGround: 0x7a9455, hemiI: 0.9, sunColor: 0xfff2d8, sunI: 1.6,
    g1: 0x7cb356, g2: 0xa8c66c, grassAccent: 0xc4c96a, sand: 0xcdbb8a, bed: 0x3d6b5e,
    water: 0x4aa8b8, waterOpacity: 0.82, flowerGlow: 0, lantern: false,
  },
  night: {
    name: 'Grassland — Night', sky: 0x0f1226, fogNear: 32, fogFar: 175,
    hemiSky: 0x3a4076, hemiGround: 0x1b2a2e, hemiI: 0.62, sunColor: 0x9fb6ff, sunI: 0.95,
    g1: 0x33504f, g2: 0x466055, grassAccent: 0x66b0a2, sand: 0x474a63, bed: 0x0f2a34,
    water: 0x1f4a66, waterOpacity: 0.9, flowerGlow: 0.7, lantern: true,
  },
};
const modeKey = new URLSearchParams(location.search).get('mode') === 'night' ? 'night' : 'day';
const BIOME = LIGHTING[modeKey];

// ================= terrain definition =================
const WATER_Y = -0.9;
const PATH = [[-10,-45],[5,-28],[11,-11],[15,8],[24,32],[30,40]];
// Channel: starts INSIDE the lake (connects lagoon → main body), flows down
// through the bridge crossing at (11,-12), then swings west/north AROUND the
// hamlet (was cutting straight through it and flooding the houses) before
// exiting the south-west corner.
const STREAM = [[58,50],[48,32],[40,16],[26,2],[11,-12],[-6,-20],[-24,-26],[-44,-38],[-62,-54]];
const LAKE = { x: 60, z: 55 };

function distSeg(px, pz, ax, az, bx, bz) {
  const dx = bx - ax, dz = bz - az;
  const t = Math.max(0, Math.min(1, ((px - ax) * dx + (pz - az) * dz) / (dx * dx + dz * dz)));
  return Math.hypot(px - ax - dx * t, pz - az - dz * t);
}

// A non-ridden boat's deck reads as ground (like the bridge) so you can climb
// aboard on foot and walk around; the ridden boat is driven by the seat logic.
function boatHeight(x, z) {
  let best = -Infinity;
  for (const b of boats) {
    if (b === riding || b.deckY === undefined) continue;
    const dx = x - b.obj.position.x, dz = z - b.obj.position.z;
    const c = Math.cos(-b.obj.rotation.y), s = Math.sin(-b.obj.rotation.y);
    const lx = dx * c - dz * s, lz = dx * s + dz * c;
    if (Math.abs(lx) < b.deckHalf.x && Math.abs(lz) < b.deckHalf.z) best = Math.max(best, b.deckY);
  }
  return best;
}

const R = A.rng(1234);
const AVOID = [
  { x: -9, z: -45, r: 15 }, { x: -55, z: 60, r: 8 }, { x: 55, z: -55, r: 8 },
  { x: -60, z: -15, r: 7 }, { x: BRIDGE.x, z: BRIDGE.z, r: 9 },
];
function blockedBy(x, z, extra = 0) {
  for (const a of AVOID) if (Math.hypot(x - a.x, z - a.z) < a.r + extra) return true;
  return false;
}
function samplePoint(opts = {}) {
  for (let tries = 0; tries < 40; tries++) {
    const x = (R() - 0.5) * 188, z = (R() - 0.5) * 188;
    const h = terrainHeight(x, z);
    if (h < WATER_Y + (opts.minShore ?? 0.45)) continue;
    if (opts.maxShore !== undefined && h > WATER_Y + opts.maxShore) continue;
    const dP = distPoly(x, z, PATH);
    if (dP < (opts.pathClear ?? 3)) continue;
    if (opts.pathFade && dP < opts.pathFade && R() < 1 - (dP - (opts.pathClear ?? 3)) / (opts.pathFade - (opts.pathClear ?? 3))) continue;
    if (blockedBy(x, z, opts.avoidExtra ?? 0)) continue;
    return { x, z, h };
  }
  return null;
}
const mtx = (x, y, z, rotY, s, sy = s) =>
  new THREE.Matrix4().compose(
    new THREE.Vector3(x, y, z),
    new THREE.Quaternion().setFromAxisAngle(new THREE.Vector3(0, 1, 0), rotY),
    new THREE.Vector3(s, sy, s));

// --- trees: 2 seeded template variants per species, instanced ---
const treePts = [];
{
  const buckets = []; // per template: matrix list
  const templates = [];
  for (const f of A.TREE_FACTORIES) for (let v = 0; v < 2; v++) { templates.push(f(f.name.length * 7 + v * 13 + 3)); buckets.push([]); }
  const cum = []; let acc = 0;
  for (const w of TREE_MIX) { acc += w; cum.push(acc); }
  const speciesFor = (h) => {
    // willows hug the shore
    if (h < WATER_Y + 1.6 && R() < 0.55) return 6 + Math.round(R()); // willow templates
    const w = R() * acc;
    for (let sp = 0; sp < 5; sp++) if (w < cum[sp]) return sp * 2 + Math.round(R());
    return 8;
  };
  let placed = 0, guard = 0;
  while (placed < 115 && guard++ < 3000) {
    const p = samplePoint({ pathClear: 5, avoidExtra: 2 });
    if (!p) continue;
    let ok = true;
    for (const t of treePts) if (Math.hypot(p.x - t.x, p.z - t.z) < 4) { ok = false; break; }
    if (!ok) continue;
    const ti = speciesFor(p.h);
    buckets[ti].push(mtx(p.x, p.h - 0.05, p.z, R() * Math.PI * 2, 0.8 + R() * 0.5, 0.8 + R() * 0.6));
    treePts.push(p);
    placed++;
  }
  for (let i = 0; i < templates.length; i++)
    if (buckets[i].length) scene.add(A.makeInstanced(templates[i], buckets[i]));
}

function createLocomotion(mixer, clips) {
  const actions = {};
  for (const name in clips) actions[name] = mixer.clipAction(clips[name]);
  let currentName = null, returnToName = 'idle';
  function play(name, { fade = 0.2, oneShot = false } = {}) {
    const next = actions[name];
    if (!next || name === currentName) return;
    const prev = currentName ? actions[currentName] : null;
    next.reset();
    if (oneShot) { next.setLoop(THREE.LoopOnce, 1); next.clampWhenFinished = true; }
    else next.setLoop(THREE.LoopRepeat, Infinity);
    next.enabled = true;
    next.setEffectiveWeight(1);
    next.play(); // crossFadeFrom only blends weights — an un-played action drives nothing (T-pose)
    if (prev) next.crossFadeFrom(prev, fade, true);
    if (oneShot) returnToName = currentName || returnToName;
    currentName = name;
  }
  // one-shot clips (jump, punch, ...) hand control back to whatever was playing before them
  mixer.addEventListener('finished', () => { const wasStep = stepping; stepping = false; if (wasStep) autoStepT = 0.4; if (swimming || isJumping || riding) return; play(returnToName, { fade: 0.2 }); });
  return { setState: play, update: dt => mixer.update(dt) };

  window.__model.traverse(o => {
  if (!o.isMesh) return;
  const mats = Array.isArray(o.material) ? o.material : [o.material];
  mats.forEach(m => console.log(o.name, {
    metalness: m.metalness,
    roughness: m.roughness,
    metalnessMap: !!m.metalnessMap,
    normalMap: !!m.normalMap,
    aoMap: !!m.aoMap,
    vertexColors: m.vertexColors,
    hasColorAttr: !!o.geometry.attributes.color,
    hasUV2: !!o.geometry.attributes.uv2 || !!o.geometry.attributes.uv1,
  }));
});
}

// A clip's tracks target bones by name; if a name matches no node the track
// drives nothing and the rig freezes in T-pose. FBX exports vary the naming
// two ways vs the loaded model: a namespace prefix ("mixamorig:Hips") and/or a
// missing node-index suffix ("Hips" where the GLB bone is "Hips_01"). nameMap
// holds every model node keyed by BOTH its full name and its suffix-stripped
// base, so each track resolves by full → namespace-stripped → suffix-stripped.
// Unmatched tracks are dropped.
function retargetClip(clip, nameMap) {
  const tracks = [], miss = new Set();
  for (const t of clip.tracks) {
    const dot = t.name.lastIndexOf('.');
    const node = t.name.slice(0, dot), prop = t.name.slice(dot);
    const stripped = node.slice(node.lastIndexOf(':') + 1);
    const target = nameMap[node] || nameMap[stripped] || nameMap[stripped.replace(/_\d+$/, '')];
    if (!target) { miss.add(node); continue; }
    const nt = t.clone();
    nt.name = target + prop;
    tracks.push(nt);
  }
  if (!tracks.length) console.warn(`[character] clip "${clip.name}" matched 0 bones — check skeleton names`);
  else if (miss.size) console.log(`[character] clip "${clip.name}" dropped ${miss.size} unmapped node(s):`, [...miss].slice(0, 6).join(', '));
  return new THREE.AnimationClip(clip.name, clip.duration, tracks);
}
// Movement is controller-driven — remove the clip's net travel (start→end
// drift) from a node's position track, keeping in-cycle bob and weight-shift.
function removeTravel(clip, nodeNames) {
  for (const t of clip.tracks) {
    if (!nodeNames.some(n => t.name === n + '.position')) continue;
    const nf = t.times.length, x0 = t.values[0], z0 = t.values[2];
    const x1 = t.values[(nf - 1) * 3], z1 = t.values[(nf - 1) * 3 + 2];
    const T = t.times[nf - 1] - t.times[0];
    for (let i = 0; i < nf; i++) {
      const f = T ? (t.times[i] - t.times[0]) / T : 0;
      t.values[i * 3] -= (x1 - x0) * f;
      t.values[i * 3 + 2] -= (z1 - z0) * f;
    }
  }
  return clip;
}

gltfCharLoader.loadAsync(CHAR_DEF.dir + CHAR_DEF.model).then(async gltf => {
  const model = gltf.scene;
  // Build the retarget name map from the model's own nodes. Two passes so a
  // real full name always wins its slot before any suffix-stripped base fills
  // a gap: e.g. FBX "Hips" resolves to the GLB bone "Hips_01".
  const nameMap = {};
  model.traverse(o => { if (o.name && !o.isMesh) nameMap[o.name] = o.name; });
  model.traverse(o => {
    if (!o.name || o.isMesh) return;
    const base = o.name.replace(/_\d+$/, '');
    if (base !== o.name && !(base in nameMap)) nameMap[base] = o.name;
  });
  // Nodes that carry whole-body travel (hips / armature / root). removeTravel
  // strips only their net start→end drift so the controller owns position.
  const rootNodes = [...new Set(Object.values(nameMap))].filter(n => /hips|armature|rootjoint/i.test(n));
  console.log('[character] root nodes:', rootNodes.join(', '));

  await Promise.all(Object.entries(CHAR_DEF.clips).map(([name, file]) =>
    fbxLoader.loadAsync(file)
      .then(fbx => { clips[name] = removeTravel(retargetClip(fbx.animations[0], nameMap), rootNodes); })
      .catch(e => console.warn(`[character] clip "${name}" (${file}) failed:`, e.message))
  ));

  // Skinned meshes animate outside their bind-pose bounds — never frustum-cull.
  model.traverse(o => { if (o.isMesh) { o.castShadow = true; o.frustumCulled = false; } });

  // Normalize height. GLB is authored ~human scale (Y-up); only stand it up if
  // it reads as authored Z-up (deeper than tall).
  model.updateMatrixWorld(true);
  let box = new THREE.Box3().setFromObject(model);
  let size = box.getSize(new THREE.Vector3());
  if (size.z > size.y * 1.4) {
    model.rotation.x = -Math.PI / 2;
    model.updateMatrixWorld(true);
    box = new THREE.Box3().setFromObject(model);
    size = box.getSize(new THREE.Vector3());
  }
  console.log(`[character] ${CHAR_DEF.model} — size ${size.x.toFixed(2)} × ${size.y.toFixed(2)} × ${size.z.toFixed(2)} u`);
  model.scale.multiplyScalar(CHAR_HEIGHT / size.y);
  model.updateMatrixWorld(true);
  model.position.y -= new THREE.Box3().setFromObject(model).min.y; // feet at group origin

  char.remove(placeholder);
  char.add(model);

  const mixer = new THREE.AnimationMixer(model);
  locomotion = createLocomotion(mixer, clips);
  if (clips.idle) locomotion.setState('idle');

  window.__clips = clips; window.__model = model; window.__mixer = mixer; // console/debug hooks
  console.log(`[character] "${CHARACTER}" loaded, clips:`, Object.keys(clips).join(', '));
}).catch(e => console.warn(`[character] ${CHARACTER} model failed, using placeholder:`, e.message));

      camera.position.set(f.x + Math.sin(t * 0.25) * r, f.y + r * 0.55, f.z - 400 + Math.cos(t * 0.25) * r);
      camera.lookAt(f.x, f.y, f.z - 400);
      sun.position.set(f.x + 8, 40, f.z - 400 + 8); sun.target.position.set(f.x, f.y, f.z - 400);
    } else {
      const a = t * 0.06;
      camera.position.set(Math.sin(a) * 58, 24, -400 + Math.cos(a) * 58);
      camera.lookAt(0, 1, -400);
      sun.position.set(30, 50, -370); sun.target.position.set(0, 0, -400);
    }
  } else if (window.__aerial) {
    scene.fog.far = 5000; scene.fog.near = 3000;
    camera.position.set(0, 175, 30);
    camera.lookAt(0, 0, -2);
    sun.position.set(40, 120, 30); sun.target.position.set(0, 0, 0);
  } else {
    updateCharacter(dt);
    updateCamera(dt);
    coordsEl.textContent = `x ${char.position.x.toFixed(1)} · z ${char.position.z.toFixed(1)} · y ${char.position.y.toFixed(1)}`;
    sun.position.set(char.position.x + 35, 55, char.position.z + 20);
    sun.target.position.copy(char.position);
  }
  renderer.render(scene, camera);
});
</script>
